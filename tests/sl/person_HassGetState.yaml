  - sentences:
      - "kdo je doma"
    intent:
      name: HassGetState
      slots:
        domain: person
        state: home
    response: "Lev"

  - sentences:
      - "ali so vsi odsotni"
    intent:
      name: HassGetState
      slots:
        domain: person
        state: not_home
    response: "Ne, Arya in Lev in ni odstoten"

  - sentences:
      - "kdo je v službi"
    intent:
      name: HassGetState
      slots:
        domain: person
        state: službi
    response: "Arya"

  - sentences:
      - "koliko oseb je doma"
    intent:
      name: HassGetState
      slots:
        domain: person
        state: home
    response: "1"

  - sentences:
      - "koliko oseb je v službi"
    intent:
      name: HassGetState
      slots:
        domain: person
        state: službi
    response: "1"

  - sentences:
      - "koliko oseb je odsotnih"
    intent:
      name: HassGetState
      slots:
        domain: person
        state: not_home
    response: "1"

  - sentences:
      - "ali je kdo doma"
    intent:
      name: HassGetState
      slots:
        domain: person
        state: home
    response: "Da, Lev"
