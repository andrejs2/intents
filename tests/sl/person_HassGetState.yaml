language: sl
tests:
  - sentences:
      - "kje je Lev"
    intent:
      name: HassGetState
      slots:
        domain: person
        name: Lev
    response: "Lev je doma"

  - sentences:
      - "Kje je Arya"
    intent:
      name: HassGetState
      slots:
        domain: person
        name: Arya
    response: "Arya je v službi"

  - sentences:
      - "ali je Arya doma"
    intent:
      name: HassGetState
      slots:
        domain: person
        name: Arya
        state: doma
    response: "Ne, v službi"

  - sentences:
      - "kje je Jon"
    intent:
      name: HassGetState
      slots:
        domain: person
        name: Jon
    response: "Jon je odsoten"

  - sentences:
      - "ali je Jon v službi"
    intent:
      name: HassGetState
      slots:
        domain: person
        name: Jon
        state: službi
    response: "Ne, odsoten"

  - sentences:
      - "ali je Lev odsoten"
    intent:
      name: HassGetState
      slots:
        domain: person
        name: Lev
        state: odsoten
    response: "Ne, doma"

  - sentences:
      - "ali so vsi doma"
    intent:
      name: HassGetState
      slots:
        domain: person
        state: home
    response: "Ne, Arya in Jon in ni doma"

  - sentences:
      - "ali so vsi v službi"
    intent:
      name: HassGetState
      slots:
        domain: person
        state: službi
    response: "Ne, Arya, Jon in Lev in ni doma"

  - sentences:
      - "kdo je odsoten"
    intent:
      name: HassGetState
      slots:
        domain: person
        state: not_home
